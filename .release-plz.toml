[workspace]
git_release_type = "auto"

# Only release when merging the release PR (avoids race conditions with squash-merge)
release_always = false

# Keep dependencies updated in Cargo.lock
dependencies_update = true

# Tag release PRs for visibility
pr_labels = ["release"]

# Override the default tag format for the original crate to preserve existing tag history
[[package]]
name = "agent-client-protocol"
git_tag_name = "v{{ version }}"
version_group = "acp"

[[package]]
name = "agent-client-protocol-derive"
version_group = "acp"

[[package]]
name = "agent-client-protocol-polyfill"
version_group = "acp"

[[package]]
name = "agent-client-protocol-rmcp"
version_group = "acp"

[[package]]
name = "agent-client-protocol-conductor"
version_group = "acp"

[[package]]
name = "agent-client-protocol-test"
version_group = "acp"
publish = false

[[package]]
name = "agent-client-protocol-trace-viewer"
version_group = "acp"

[[package]]
name = "agent-client-protocol-yopo"
version_group = "acp"
publish = false

[[package]]
name = "agent-client-protocol-cookbook"
version_group = "acp"
