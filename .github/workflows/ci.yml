name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          toolchain: nightly,stable
          components: rustfmt,clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check for typos
        uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2
        with:
          config: ./typos.toml

      - name: Lint
        run: |
          cargo clippy
          cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Check docs.rs build
        env:
          RUSTDOCFLAGS: --cfg docsrs
        run: cargo +nightly doc -p agent-client-protocol --all-features --no-deps

      - name: Install just
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4
        with:
          tool: just

      - name: Run tests
        run: just test

  feature-powerset:
    name: Feature powerset (${{ matrix.partition }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        partition:
          - "1/16"
          - "2/16"
          - "3/16"
          - "4/16"
          - "5/16"
          - "6/16"
          - "7/16"
          - "8/16"
          - "9/16"
          - "10/16"
          - "11/16"
          - "12/16"
          - "13/16"
          - "14/16"
          - "15/16"
          - "16/16"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          toolchain: stable

      - name: Install cargo-hack
        uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4
        with:
          tool: cargo-hack

      - name: Check feature powerset
        # `default` is empty and `unstable` is an aggregate alias for the
        # individual unstable_* features, so excluding both avoids checking
        # duplicate combinations. The regular CI all-features build still covers
        # the aggregate feature.
        run: cargo hack check --workspace --feature-powerset --exclude-features default,unstable --no-dev-deps --partition ${{ matrix.partition }}
